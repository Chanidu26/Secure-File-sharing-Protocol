# SonarCloud Project Information
sonar.projectKey=chanidu-org_information-security-project
sonar.organization=chanidu-org

# Project Info
sonar.projectName=Information Security Project
sonar.projectVersion=1.0

# Source Code
sonar.sources=.

# Python Settings
sonar.language=py
sonar.sourceEncoding=UTF-8

# Exclude unnecessary files
sonar.exclusions=**/__pycache__/**,**/*.pyc,venv/**,.venv/**,tests/**

# Test Configuration
sonar.tests=tests
sonar.python.coverage.reportPaths=coverage.xml

# Optional
sonar.verbose=true